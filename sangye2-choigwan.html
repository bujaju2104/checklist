<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>상계뉴타운 2구역 매매 체크리스트</title>
<link rel="manifest" href="/checklist/manifest-sangye2.json">
<link rel="icon" href="/checklist/icon-192.png">
<link rel="apple-touch-icon" href="/checklist/icon-192.png">
<meta name="theme-color" content="#16a34a">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --green:#16a34a;
    --green2:#059669;
    --bg:#f3f4f6;
    --card:#ffffff;
    --text:#1f2937;
    --muted:#6b7280;
    --line:#e5e7eb;
    --soft:#ecfdf5;
    --soft2:#eef2ff;
    --orange:#f59e0b;
    --navy:#0f172a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
  .wrap{max-width:780px;margin:0 auto;padding-bottom:90px}
  .hero{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;padding:20px 18px 16px;border-bottom-left-radius:20px;border-bottom-right-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
  .title{font-size:30px;font-weight:900;line-height:1.18;letter-spacing:-.8px}
  .sub{margin-top:10px;font-size:14px;opacity:.95;line-height:1.55}
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:700;backdrop-filter:blur(6px)}
  .body{padding:14px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:8px 0 14px}
  .identity{display:flex;gap:8px;flex-wrap:wrap}
  .mini-btn{border:none;background:#fff;border-radius:12px;padding:10px 12px;font-weight:700;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer}
  .mini-btn.secondary{background:var(--soft2);color:#334155}
  .tabs{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .tab{padding:14px 6px;text-align:center;border:none;background:#fff;color:#64748b;font-weight:800;font-size:13px;cursor:pointer;border-bottom:3px solid transparent}
  .tab .ico{display:block;font-size:22px;margin-bottom:6px}
  .tab.on{color:var(--green);border-bottom-color:var(--green);background:#f9fffb}
  .panel{margin-top:12px;background:#fff;border-radius:18px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .section-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
  .section-title{font-size:26px;font-weight:900;letter-spacing:-.6px;color:var(--green)}
  .pct{font-size:18px;font-weight:900;color:var(--green)}
  .bar{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:16px}
  .fill{height:100%;background:linear-gradient(90deg,var(--green),#22c55e);width:0%}
  .box-title{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:900;color:var(--green);margin:10px 0 12px}
  .item-box{background:#f7faf8;border:1px solid #d9f3df;border-radius:18px;overflow:hidden}
  .item{display:flex;align-items:flex-start;gap:12px;padding:14px 14px;border-bottom:1px solid #e8f3eb;cursor:pointer}
  .item:last-child{border-bottom:none}
  .check{width:30px;height:30px;border-radius:10px;background:#d1fae5;color:#16a34a;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex:0 0 30px;border:1px solid #b7ebc3}
  .item.done .check{background:#16a34a;color:#fff;border-color:#16a34a}
  .txt{flex:1;min-width:0}
  .main{font-size:17px;font-weight:900;color:#4b5563;line-height:1.35;letter-spacing:-.3px}
  .subtxt{margin-top:4px;font-size:13px;color:#94a3b8;line-height:1.45}
  .date{display:inline-flex;align-items:center;gap:6px;margin-top:4px;color:#16a34a;font-size:13px;font-weight:800}
  .badge{align-self:center;background:#dcfce7;color:#16a34a;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900;white-space:nowrap}
  .item:not(.done) .badge{background:#fef3c7;color:#b45309}
  .card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-top:12px}
  .card h3{margin:0 0 10px;font-size:16px}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .meta{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px}
  .meta .k{font-size:12px;color:#64748b;margin-bottom:4px}
  .meta .v{font-size:14px;font-weight:800;color:#0f172a;line-height:1.4}
  .log{max-height:210px;overflow:auto;padding-right:4px}
  .log-item{font-size:13px;color:#334155;padding:9px 0;border-bottom:1px dashed #e5e7eb}
  .log-item:last-child{border-bottom:none}
  .muted{color:var(--muted);font-size:12px}
  .foot{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #dbe4ea;padding:13px 16px;text-align:center;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
  .foot .name{font-size:16px;font-weight:900;color:#111827}
  .foot .tel{font-size:15px;color:#475569;font-weight:700;margin-top:4px}
  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 16px;border-radius:12px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:9999}
  .toast.show{opacity:1}
  @media (max-width:640px){
    .title{font-size:20px}
    .tabs{grid-template-columns:repeat(5,1fr)}
    .tab{font-size:12px;padding:12px 4px}
    .tab .ico{font-size:18px}
    .section-title{font-size:18px}
    .main{font-size:14px}
    .subtxt,.date,.badge{font-size:12px}
    .meta-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="wrap">
  <div class="hero">
    <div class="title">상계뉴타운 2구역 매매 체크리스트</div>
    <div class="sub">최종관 · 심재욱·방종복 | 매매가 4억 500만원 | 문멘토공인중개사사무소</div>
    <div class="pill-row">
      <div class="pill">💵 4억 500만원</div>
      <div class="pill">👤 매수인 최종관</div>
      <div class="pill">✅ 실시간 연동</div>
      <div class="pill">🔔 브라우저 알림</div>
    </div>
  </div>

  <div class="body">
    <div class="toolbar">
      <div class="identity">
        <button class="mini-btn" id="actorBtn">작성자: 문멘토</button>
        <button class="mini-btn secondary" id="notiBtn">알림 권한 요청</button>
      </div>
      <div class="muted" id="syncStatus">연동 준비중...</div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="panel">
      <div class="section-top">
        <div class="section-title" id="sectionTitle">가계약</div>
        <div class="pct" id="sectionPct">0%</div>
      </div>
      <div class="bar"><div class="fill" id="sectionFill"></div></div>
      <div class="box-title" id="boxTitle">🤝 가계약 진행</div>
      <div class="item-box" id="itemBox"></div>
    </div>

    <div class="card">
      <h3>기본 정보</h3>
      <div class="meta-grid">
        <div class="meta"><div class="k">소재지</div><div class="v">상계동 1374-13</div></div>
        <div class="meta"><div class="k">매수인</div><div class="v">최종관님</div></div>
        <div class="meta"><div class="k">매도인</div><div class="v">심재욱 · 방종복</div></div>
        <div class="meta"><div class="k">조합원번호</div><div class="v">157-1</div></div>
        <div class="meta"><div class="k">매매가</div><div class="v">4억 500만원</div></div>
        <div class="meta"><div class="k">가계약금</div><div class="v">1,000만원 (26.06.06 완료)</div></div>
      </div>
    </div>

    <div class="card">
      <h3>실시간 기록</h3>
      <div class="log" id="logBox"></div>
    </div>
  </div>
</div>

<div class="foot">
  <div class="name">문멘토공인중개사사무소</div>
  <div class="tel">010.6336.1828 | 010.4336.5038</div>
</div>

<script>
const SUPABASE_URL = 'https://bjmanwqmoeobkpxehfpm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqbWFud3Ftb2VvYmtweGVoZnBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTkxNzEsImV4cCI6MjA5NDI3NTE3MX0.WwsdEiwO_uGV44v7bAq5twKbRdYlComsUb7yJIYW7BA';
const PAGE_ID = 'sangye2-choigwan';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const stages = [
  {
    key:'pre', label:'가계약', icon:'🤝', title:'가계약 진행',
    items:[
      {id:'pre_1', title:'가계약금 입금 완료 확인', date:'2026.06.06', desc:'1,000만원 · 심재욱 계좌 입금 완료'},
      {id:'pre_2', title:'조합원 자격 확인', date:'확인 필요', desc:'조합원번호 157-1 / 심재욱 적법성 확인'},
      {id:'pre_3', title:'공동명의자 동의 확인', date:'확인 필요', desc:'방종복 동의 및 인감증명서 확인'}
    ]
  },
  {
    key:'contract', label:'계약', icon:'📝', title:'계약 진행',
    items:[
      {id:'contract_1', title:'계약금 잔여 3,000만원 준비', date:'2026.06.11', desc:'당일 이체한도 해제 확인'},
      {id:'contract_2', title:'계약서 특약사항 확인', date:'계약일', desc:'체납세금·조합비·추가분담금 부담 주체 명시'},
      {id:'contract_3', title:'매도인/공동명의자 신분 및 서류 확인', date:'계약일', desc:'심재욱·방종복 동석 또는 위임서류 확인'}
    ]
  },
  {
    key:'middle', label:'중도금', icon:'💰', title:'중도금 진행',
    items:[
      {id:'middle_1', title:'중도금 일정 협의', date:'협의', desc:'매수인·매도인 일정 최종 조율'},
      {id:'middle_2', title:'중도금 지급 확인', date:'예정', desc:'계좌 및 영수 확인'}
    ]
  },
  {
    key:'balance', label:'잔금', icon:'🏠', title:'잔금 진행',
    items:[
      {id:'balance_1', title:'잔금 및 잔금영수 확인', date:'계약 후 2~2.5개월', desc:'최종 잔금 지급 및 영수증 수령'},
      {id:'balance_2', title:'조합원 승계 서류 제출', date:'잔금일', desc:'초본·등본·가족관계증명서 등 승계 서류 제출'},
      {id:'balance_3', title:'명의변경 완료 확인', date:'잔금 후', desc:'심재욱·방종복 → 최종관님'}
    ]
  },
  {
    key:'track', label:'추적', icon:'🚧', title:'사업 추적',
    items:[
      {id:'track_1', title:'관리처분인가 추적', date:'예정', desc:'2026년 9월 예정 흐름 체크'},
      {id:'track_2', title:'이주 진행 체크', date:'예정', desc:'이주 공지 및 일정 안내'},
      {id:'track_3', title:'철거 진행 체크', date:'예정', desc:'철거 일정 및 현장 진행'},
      {id:'track_4', title:'착공 진행 체크', date:'예정', desc:'착공 공지 및 향후 분양 일정 확인'}
    ]
  }
];

const defaultState = {
  actor:'문멘토',
  currentStage:'pre',
  checks:{},
  logs:[{ts:new Date().toLocaleString('ko-KR'), msg:'체크리스트가 생성되었습니다.', actor:'시스템'}],
  updated_by:'시스템',
  updated_at:new Date().toISOString()
};

let state = JSON.parse(localStorage.getItem('sg2_rt_local') || 'null') || structuredClone(defaultState);
let bootstrapped = false;
let suppressRemoteToast = true;

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}

function saveLocal(){ localStorage.setItem('sg2_rt_local', JSON.stringify(state)); }

function askActor(){
  const v = prompt('작성자 이름을 입력해주세요. 예) 문멘토 / 최종관', state.actor || '문멘토');
  if(v && v.trim()){
    state.actor = v.trim();
    saveLocal();
    render();
    toast('작성자가 '+state.actor+'(으)로 설정되었습니다.');
  }
}

document.getElementById('actorBtn').onclick = askActor;
document.getElementById('notiBtn').onclick = async ()=>{
  if(!('Notification' in window)){ alert('이 브라우저는 알림을 지원하지 않습니다.'); return; }
  const p = await Notification.requestPermission();
  toast('알림 권한: ' + p);
};

function renderTabs(){
  const box = document.getElementById('tabs');
  box.innerHTML = stages.map(s=>{
    const total=s.items.length;
    const done=s.items.filter(i=>state.checks[i.id]).length;
    return `<button class="tab ${state.currentStage===s.key?'on':''}" onclick="switchStage('${s.key}')"><span class="ico">${s.icon}</span>${s.label}<br><span style="font-size:11px">${done}/${total}</span></button>`;
  }).join('');
}

function renderPanel(){
  const stage = stages.find(s=>s.key===state.currentStage) || stages[0];
  const total=stage.items.length;
  const done=stage.items.filter(i=>state.checks[i.id]).length;
  const pct= total ? Math.round(done/total*100):0;
  document.getElementById('sectionTitle').textContent = stage.label;
  document.getElementById('sectionPct').textContent = pct + '%';
  document.getElementById('sectionFill').style.width = pct + '%';
  document.getElementById('boxTitle').textContent = `${stage.icon} ${stage.title}`;
  document.getElementById('itemBox').innerHTML = stage.items.map(item=>`
    <div class="item ${state.checks[item.id]?'done':''}" onclick="toggleItem('${item.id}')">
      <div class="check">${state.checks[item.id]?'✓':''}</div>
      <div class="txt">
        <div class="main">${item.title}</div>
        <div class="date">📅 ${item.date}</div>
        <div class="subtxt">${item.desc}</div>
      </div>
      <div class="badge">${state.checks[item.id]?'완료':'대기'}</div>
    </div>
  `).join('');
}

function renderLogs(){
  const box=document.getElementById('logBox');
  box.innerHTML = (state.logs||[]).slice(0,30).map(l=>`<div class="log-item"><strong>${l.actor}</strong> · ${l.msg}<div class="muted">${l.ts}</div></div>`).join('');
}

function render(){
  document.getElementById('actorBtn').textContent = '작성자: ' + (state.actor || '문멘토');
  renderTabs();
  renderPanel();
  renderLogs();
}

window.switchStage = function(key){ state.currentStage = key; saveLocal(); render(); };

window.toggleItem = async function(id){
  state.checks[id] = !state.checks[id];
  const item = stages.flatMap(s=>s.items).find(i=>i.id===id);
  state.updated_by = state.actor;
  state.updated_at = new Date().toISOString();
  state.logs.unshift({ts:new Date().toLocaleString('ko-KR'), actor:state.actor, msg:`${item.title} ${state.checks[id] ? '체크 완료' : '체크 해제'}`});
  state.logs = state.logs.slice(0,100);
  saveLocal();
  render();
  await pushState();
};

async function ensureRow(){
  const {data,error} = await supabase.from('checklist_pages').select('*').eq('page_id', PAGE_ID).maybeSingle();
  if(error){
    document.getElementById('syncStatus').textContent='연동 오류';
    console.error(error);
    return;
  }
  if(!data){
    const {error:insertErr} = await supabase.from('checklist_pages').insert({page_id:PAGE_ID,data:state});
    if(insertErr) console.error(insertErr);
  } else {
    state = {...defaultState, ...data.data};
    saveLocal();
    render();
  }
  document.getElementById('syncStatus').textContent='실시간 연동중';
}

async function pushState(){
  const payload = {...state, updated_by:state.actor, updated_at:new Date().toISOString()};
  const {error} = await supabase.from('checklist_pages').upsert({page_id:PAGE_ID,data:payload,updated_at:new Date().toISOString()});
  if(error){
    document.getElementById('syncStatus').textContent='로컬 저장중';
    console.error(error);
  } else {
    document.getElementById('syncStatus').textContent='실시간 연동중';
  }
}

async function initRealtime(){
  render();
  await ensureRow();
  await pushState();
  suppressRemoteToast = false;
  supabase.channel('checklist_pages_changes')
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'checklist_pages', filter:`page_id=eq.${PAGE_ID}`}, payload => {
      const remote = payload.new.data || {};
      if(remote.updated_at && remote.updated_at === state.updated_at) return;
      const remoteActor = remote.updated_by || '상대방';
      const myActor = state.actor;
      state = {...defaultState, ...remote};
      saveLocal();
      render();
      if(!suppressRemoteToast && remoteActor !== myActor){
        toast(`${remoteActor}님이 체크리스트를 업데이트했습니다.`);
        if('Notification' in window && Notification.permission==='granted'){
          new Notification('상계 체크리스트 업데이트', { body: `${remoteActor}님이 변경했습니다.` });
        }
      }
    })
    .subscribe((status)=>{
      document.getElementById('syncStatus').textContent = status === 'SUBSCRIBED' ? '실시간 연동중' : '연결중...';
    });
}

initRealtime();
</script>
</body>
</html>
