async function initRemote(){
  try{
    if(!window.supabase) return;
    sb=window.supabase.createClient(PROJECT_URL, ANON_KEY);
    const {data,error}=await sb.from('checklist_pages').select('*').eq('page_id',PAGE_ID).maybeSingle();
    if(!error && data && data.data){
      const remote=data.data;
      const localTime=S.updated_at?Date.parse(S.updated_at):0;
      const remoteTime=remote.updated_at?Date.parse(remote.updated_at):0;
      if(remoteTime>localTime && Date.now()-localStamp>1200){
        S.checks=remote.checks||S.checks||{};
        S.page=remote.page||S.page||{};
        S.logs=remote.logs||S.logs||[];
        S.buyer=remote.buyer||S.buyer||{};
        save();
        render(); upd();
        toast('공유 데이터 불러옴');
      }
    } else {
      pushRemoteSoon();
    }
    sb.channel('sg2_clean_changes').on('postgres_changes',{event:'UPDATE',schema:'public',table:'checklist_pages',filter:'page_id=eq.'+PAGE_ID},payload=>{
      const remote=payload.new&&payload.new.data?payload.new.data:null;
      if(!remote) return;
      const remoteTime=remote.updated_at?Date.parse(remote.updated_at):0;
      const localTime=S.updated_at?Date.parse(S.updated_at):0;
      if(Date.now()-localStamp<1500) return;
      if(remoteTime<=localTime) return;
      S.checks=remote.checks||S.checks||{};
      S.page=remote.page||S.page||{};
      S.logs=remote.logs||S.logs||[];
      S.buyer=remote.buyer||S.buyer||{};
      save(); render(); upd(); toast('상대방 변경 반영');
    }).subscribe();
  }catch(e){ console.log(e); }
}

function onlyNum(v){return String(v||'').replace(/[^0-9]/g,'')}

function toKstIsoFromLocal(dateStr,timeStr){
  // 브라우저 입력값을 KST 기준으로 Supabase 저장용 ISO 비슷한 문자열로 저장
  return `${dateStr}T${timeStr || '10:00'}:00+09:00`;
}
function addDaysToDateString(dateStr,days){
  const d=new Date(dateStr+'T00:00:00+09:00');
  d.setDate(d.getDate()+days);
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
async function saveContractDayBeforeSchedule(){
  const date=document.getElementById('scheduleContractDate')?.value||'';
  const time=document.getElementById('scheduleContractTime')?.value||'10:00';
  const message=(document.getElementById('scheduleMessage')?.value||'').trim();
  if(!date){alert('계약 예정일을 선택해주세요.');return;}
  if(!message){alert('알림 문구를 입력해주세요.');return;}
  const alertDate=addDaysToDateString(date,-1);
  const dueAt=toKstIsoFromLocal(alertDate,time);
  try{
    await callManageSms('saveSchedule',{
      title:'하루 전 계약 알림',
      dueAt,
      message
    });
    alert('하루 전 계약 알림이 저장되었습니다.');
    loadSmsSchedulesFromDB();

}

function checklistSummary(){
  const checked=[], unchecked=[];
  Object.keys(D).forEach(g=>(D[g].pages||[]).forEach((p,pi)=>{
    if(D[g].type==='check'&&p.kind!=='pay'&&p.items){
      p.items.forEach((it,i)=>{
        const key=`${g}_${pi}_${i}`;
        (S.checks[key]?checked:unchecked).push(it[0]);
      });
    }
  }));
  return {checked,unchecked};
}
function makeSummaryText(s){
  const c=s.checked.slice(0,40).map(function(t){ return '체크: '+t; }).join('\n') || '체크된 항목 없음';
  return '[현재 체크된 항목]\n' + c;
}

체크 ${s.checked.length}개`)) return;
  try{
    const res=await fetch(PROJECT_URL+'/functions/v1/send-checklist-sms',{

}
