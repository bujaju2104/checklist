          {title:'임대차계약서', meta:'임차인 있는 경우', status:'todo'},
          {title:'사업자등록증', meta:'임차인이 사업자등록 된 경우', status:'todo'}
        ]}
      ]},
      proxy:{label:'대리잔금', groups:[
        {title:'대리 잔금시 추가 서류', tone:'gray', items:[
          {title:'대리인 신분증', meta:'', status:'ref'},
          {title:'위임장', meta:'인감도장 날인', status:'ref'},
          {title:'인감증명서', meta:'', status:'ref'}
        ]}
      ]},
      item:{label:'물품인계', groups:[
        {title:'물품 인계', tone:'teal', items:[
          {title:'물품인계서 작성 및 서명', meta:'', status:'todo'},
          {title:'열쇠·카드 인계', meta:'', status:'todo'},
          {title:'공동현관 비밀번호', meta:'', status:'todo'},
          {title:'세대현관 비밀번호', meta:'', status:'todo'}
        ]}
      ]}
    }
  }
};
let state = loadState();
let currentMain='deposit';
let currentSub='only';
let pending=[];
let sb=null;
let pushTimer=null;
let localStamp=0;
function loadState(){const raw=localStorage.getItem(STORAGE_KEY);if(raw){try{return JSON.parse(raw)}catch(e){}}const init={};Object.entries(DATA).forEach(([mk,mv])=>{Object.entries(mv.subtabs).forEach(([sk,sv])=>{sv.groups.forEach((g,gi)=>{g.items.forEach((it,ii)=>{init[keyOf(mk,sk,gi,ii)] = (it.status==='done');});});});});return init;}
function saveState(){
  state.__updated_at=new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  pushRemoteSoon();
}
function keyOf(m,s,g,i){return `${m}__${s}__${g}__${i}`;}
function toggle(m,s,g,i,status){
  if(status==='ref') return;
  const key = keyOf(m,s,g,i);
  state[key]=!state[key];
  const label=findItemLabel(m,s,g,i);
  pending=pending.filter(x=>x.key!==key);
  pending.push({key:key,label:label,status:state[key]?'체크':'해제'});
  localStamp=Date.now();
  saveState();
  render();
}
function checked(m,s,g,i){return !!state[keyOf(m,s,g,i)];}
function renderTabs(){const mainWrap=document.getElementById('mainTabs');mainWrap.innerHTML='';Object.entries(DATA).forEach(([key,val])=>{const el=document.createElement('div');el.className='main-tab'+(currentMain===key?' active':'');el.innerHTML=`<span class="icon">${val.icon}</span>${val.label}`;el.onclick=()=>{currentMain=key; currentSub=Object.keys(DATA[key].subtabs)[0]; render();};mainWrap.appendChild(el);});const subWrap=document.getElementById('subTabs');subWrap.innerHTML='';const subs=DATA[currentMain].subtabs;const subKeys=Object.keys(subs);subWrap.style.gridTemplateColumns=`repeat(${subKeys.length},1fr)`;subKeys.forEach(sk=>{const el=document.createElement('div');el.className='sub-tab'+(currentSub===sk?' active':'');el.textContent=subs[sk].label;el.onclick=()=>{currentSub=sk; render();};subWrap.appendChild(el);});}
function stagePercent(mainKey){
  let total=0, done=0;
  const stage=DATA[mainKey];
  Object.entries(stage.subtabs).forEach(([subKey,subVal])=>{
    subVal.groups.forEach((group,gi)=>{
      group.items.forEach((item,ii)=>{
        if(item.status==='ref') return;
        total++;
        if(checked(mainKey,subKey,gi,ii)) done++;
      });
    });
  });
  return total ? Math.round(done/total*100) : 0;
}
function renderStage(){
  const stage=DATA[currentMain];
  const pct=stagePercent(currentMain);
  document.getElementById('stageTitle').textContent=`${stage.icon} ${stage.label}`;
  document.getElementById('stagePct').textContent=`${pct}%`;
  document.getElementById('stageFill').style.width=`${pct}%`;
}
function renderScreen(){const target=document.getElementById('screen');target.innerHTML='';const section=DATA[currentMain].subtabs[currentSub];section.groups.forEach((group,gi)=>{const lab=document.createElement('div');lab.className='group-label '+(group.tone||'teal');lab.innerHTML=`<span class="bar"></span>${group.title}`;target.appendChild(lab);const card=document.createElement('div');card.className='card';group.items.forEach((it,ii)=>{const isRef=it.status==='ref';const isDone=isRef?false:checked(currentMain,currentSub,gi,ii);const row=document.createElement('div');row.className='row'+(isDone?' done':'')+(isRef?' ref':'');row.onclick=()=>toggle(currentMain,currentSub,gi,ii,it.status);row.innerHTML=`<div class="box"><span class="tick">✓</span></div><div class="text"><div class="main">${it.title}</div>${it.meta?`<div class="meta">${it.meta}</div>`:''}</div><div class="badge">${isRef?'참고':(isDone?'완료':'예정')}</div>`;card.appendChild(row);});target.appendChild(card);});}

function findItemLabel(m,s,g,i){
  try{
    const item=DATA[m].subtabs[s].groups[g].items[i];
    return item.title + (item.meta ? ' - ' + item.meta.replace(/<[^>]*>/g,'').trim() : '');
  }catch(e){return '항목'}
}
function openActor(){
  const el=document.getElementById('modal');
  if(el) el.style.display='flex';
}
function closeActor(){
  const el=document.getElementById('modal');
  if(el) el.style.display='none';
}

function sendSmsFromForm(){
  const actorEl=document.getElementById('smsActor');
  const actor=actorEl&&actorEl.value?actorEl.value:'손윤주';
  sendSms(actor);
}

async function sendSms(actor){
  if(!pending.length){
    alert('이번에 체크하거나 해제한 항목이 없습니다.');
    return;
  }

  const nameEl=document.getElementById('smsName');
  const phoneEl=document.getElementById('smsPhone');
  const receiverName=(nameEl&&nameEl.value?nameEl.value.trim():'정병욱');
  const receiverPhone=(phoneEl&&phoneEl.value?phoneEl.value.replace(/[^0-9]/g,''):'').trim();

  if(!receiverPhone){
    alert('수신자 휴대폰번호를 입력해야 문자 발송됩니다.');
    return;
  }
  if(receiverPhone.length<10){
    alert('휴대폰번호를 다시 확인해 주세요.');
    return;
  }

  const summary='[광명 더프라임타워 402호 매매 체크리스트]\n'
    +'수신자: '+receiverName+'\n'
    +'물건: 경기도 광명시 광명동 102-1 외 1필지 더프라임타워 402호\n\n'
    +'[이번 변경 항목]\n'
    +pending.map(x=>x.status+': '+x.label).join('\n');

  if(!confirm('수신자: '+receiverName+'\n번호: '+receiverPhone+'\n처리자: '+actor+'\n\n변경 '+pending.length+'개 항목을 문자 발송합니다.')) return;

  try{
    const res=await fetch(SEND_SMS_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        pageId:PAGE_ID,
        actor:actor,
        recipientName:receiverName,
        recipientLabel:receiverName,
        to:receiverPhone,
        phone:receiverPhone,
        recipientPhone:receiverPhone,
        summaryText:summary,
        pageTitle:'광명 더프라임타워 402호 매매 체크리스트',
        pageUrl:'https://bujaju2104.github.io/checklist/gwangmyeong-prime-402-direct.html'
      })
    });
    const raw=await res.text();
    let data={};
    try{data=raw?JSON.parse(raw):{};}catch(e){data={raw};}
    if(!res.ok||data.ok===false) throw new Error(data.error||data.message||raw||'문자 발송 실패');
    pending=[];
    closeActor();
    alert('문자 발송 완료\n실제 전송번호: ' + (data.sentTo || receiverPhone));
  }catch(e){
    alert('문자 발송 오류\n'+(e.message||e));
  }
}
async function initRemote(){
  try{
    if(!window.supabase) return;
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    const {data,error}=await sb.from('checklist_pages').select('*').eq('page_id',PAGE_ID).maybeSingle();
    if(!error && data && data.data){
      const remote=data.data;
      const rt=remote.__updated_at?Date.parse(remote.__updated_at):0;
      const lt=state.__updated_at?Date.parse(state.__updated_at):0;
      if(rt>lt){
        state=remote;
        localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
        render();
      }
    }else{
      pushRemoteSoon();
    }
    sb.channel('gm402_officetel_realtime')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'checklist_pages',filter:'page_id=eq.'+PAGE_ID},payload=>{
        const remote=payload.new && payload.new.data;
        if(!remote) return;
        if(Date.now()-localStamp<1500) return;
        const rt=remote.__updated_at?Date.parse(remote.__updated_at):0;
        const lt=state.__updated_at?Date.parse(state.__updated_at):0;
        if(rt>lt){
          state=remote;
          localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
          render();
        }
      }).subscribe();
  }catch(e){
    console.log('DB 연결 오류',e);
  }
}
function pushRemoteSoon(){
  if(pushTimer) clearTimeout(pushTimer);
  pushTimer=setTimeout(pushRemote,500);
}
async function pushRemote(){
  try{
    if(!sb) return;
    await sb.from('checklist_pages').upsert({
      page_id:PAGE_ID,
      data:state,
      updated_at:new Date().toISOString()
    });
  }catch(e){
    console.log('DB 저장 오류',e);
  }
}

function render(){renderTabs();renderStage();renderScreen();}
render();
initRemote();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/checklist/sw-gwangmyeong-prime-402.js').catch(()=>{});}
</script>
