      page_id: PAGE_ID,

<script>
(function(){
  const SUPABASE_URL_SMS_MANUAL = "https://bjmanwqmoeobkpxehfpm.supabase.co";
  const SUPABASE_ANON_KEY_SMS_MANUAL = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqbWFud3Ftb2VvYmtweGVoZnBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTkxNzEsImV4cCI6MjA5NDI3NTE3MX0.WwsdEiwO_uGV44v7bAq5twKbRdYlComsUb7yJIYW7BA";
  const SEND_SMS_FUNCTION_URL_MANUAL = SUPABASE_URL_SMS_MANUAL + "/functions/v1/send-checklist-sms";

  function getSelectedActor(){
    try { return localStorage.getItem("sg2_actor_name") || ""; }
    catch(e){ return ""; }
  }

  function updateActorView(){
    const actor = getSelectedActor();
    const view = document.getElementById("currentActorView");
    if(view){
      view.textContent = actor ? "현재 처리자: " + actor : "현재 처리자: 미선택";
      view.style.color = actor ? "#1a2744" : "#b45309";
    }

    const buttons = [
      ["actorSonBtn", "손윤주"],
      ["actorMentoBtn", "문멘토"],
      ["actorBuyerBtn", "최종관"]
    ];

    buttons.forEach(function(pair){
      const btn = document.getElementById(pair[0]);
      if(btn) btn.style.background = actor === pair[1] ? "#1a2744" : "#6b7280";
    });
  }

  window.setChecklistActor = function(name){
    localStorage.setItem("sg2_actor_name", name || "");
    updateActorView();
    const el = document.getElementById("syncToast");
    if(el){
      el.textContent = "처리자 선택: " + name;
      el.classList.add("show");
      setTimeout(function(){ el.classList.remove("show"); }, 1800);
    }
  };

  window.setChecklistActorFromInput = function(){
    const input = document.getElementById("customActorInput");
    const v = input ? input.value.trim() : "";
    if(!v){
      alert("기타 처리자 이름을 입력해주세요.");
      return;
    }
    window.setChecklistActor(v);
  };

  function requireActor(){
    const actor = getSelectedActor();
    if(!actor){
      alert("알림 탭에서 처리자를 먼저 선택해주세요.");
      return "";
    }
    return actor;
  }

  function getChecklistSummary(){
    const rows = Array.from(document.querySelectorAll(".check, .chk, .item, .todo, li, .check-row"));
    const found = [];
    const seen = new Set();

    rows.forEach(function(el){
      const textEl = el.querySelector ? (el.querySelector(".cmain") || el.querySelector(".title") || el.querySelector(".txt") || el) : el;
      let title = (textEl.textContent || "").replace(/\s+/g, " ").trim();
      if(!title) return;
      if(title.length > 80) title = title.slice(0, 80);

      const hasCheckbox = el.querySelector ? el.querySelector('input[type="checkbox"]') : null;
      const checkedByInput = hasCheckbox ? hasCheckbox.checked : false;
      const checkedByClass = el.classList ? (el.classList.contains("done") || el.classList.contains("checked") || el.classList.contains("on")) : false;
      const looksChecklist = hasCheckbox || checkedByClass || (el.className && String(el.className).match(/check|chk|todo|item/i));
      if(!looksChecklist) return;

      if(seen.has(title)) return;
      seen.add(title);

      found.push({ title: title, checked: checkedByInput || checkedByClass });
    });

    return {
      checked: found.filter(x => x.checked).map(x => x.title),
      unchecked: found.filter(x => !x.checked).map(x => x.title),
      total: found.length
    };
  }

  function makeSummaryText(summary){
    const checkedLines = summary.checked.slice(0, 15).map(function(t){
      return "체크: " + t;
    });

    const uncheckedLines = summary.unchecked.slice(0, 15).map(function(t){
      return "해제: " + t;
    });

    let text = "";
    text += "[체크 내역] " + summary.checked.length + "건";
    if(checkedLines.length){
      text += "
" + checkedLines.join("
");
    }else{
      text += "
체크된 항목 없음";
    }

    text += "

[해제 내역] " + summary.unchecked.length + "건";
    if(uncheckedLines.length){
      text += "
" + uncheckedLines.join("
");
    }else{
      text += "
해제된 항목 없음";
    }

    if(summary.checked.length > 15 || summary.unchecked.length > 15){
      text += "

※ 전체 상세는 체크리스트 링크에서 확인";
    }

    return text;
  }

  window.__sendFinalChecklistSmsAfterActor = async function(){
    const actor = requireActor();
    if(!actor) return;

    const summary = getChecklistSummary();
    const summaryText = makeSummaryText(summary);
    const recipientLabel = (document.getElementById("smsRecipientLabel")?.value || "저장된 수신자").trim();

    const preview = document.getElementById("finalSmsPreview");
    if(preview){
      preview.textContent = "발송 요약\n처리자: " + actor + "\n수신: " + recipientLabel + "\n" + summaryText;
    }

    if(!confirm("문자를 발송할까요?\n\n처리자: " + actor + "\n수신: " + recipientLabel + "\n체크 완료 " + summary.checked.length + "건 / 미완료 " + summary.unchecked.length + "건")){
      return;
    }

    try {
      const res = await fetch(SEND_SMS_FUNCTION_URL_MANUAL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + SUPABASE_ANON_KEY_SMS_MANUAL,
          "apikey": SUPABASE_ANON_KEY_SMS_MANUAL
        },
        body: JSON.stringify({
          mode: "manual_summary",
          pageId: "sangye2-choigwan",
          actor: actor,
          recipientLabel: recipientLabel,
          itemTitle: "체크리스트 최종 확인",
          checked: true,
          summaryText: summaryText,
          checkedCount: summary.checked.length,
          uncheckedCount: summary.unchecked.length,
          pageUrl: "https://bujaju2104.github.io/checklist/sangye2-choigwan.html"
        })
      });

      const data = await res.json().catch(function(){ return {}; });

      if(!res.ok || data.ok === false){
        alert("문자발송오류\n" + (data.error || data.result || "Supabase Logs 확인 필요"));
        return;
      }

      alert("문자 발송 완료\n수신번호: " + ((data.sentTo || []).join(", ") || "발송 완료"));
    } catch(e) {
      alert("문자발송오류\n" + e.message);
    }
  };

  // 자동 문자 발송 금지
  window.sendChecklistSmsToAll = function(){};

  document.addEventListener("DOMContentLoaded", updateActorView);
  setTimeout(updateActorView, 500);
})();
</script>

      alert("문자 발송 함수를 찾을 수 없습니다. 페이지를 새로고침해주세요.");
    }
  };

  window.chooseCustomActorAndSend = function(){
    var input = document.getElementById("actorModalCustomInput");
    var v = input ? input.value.trim() : "";
    if(!v){
      alert("기타 처리자를 입력해주세요.");
      return;
    }
    window.chooseActorAndSend(v);
  };

  // 혹시 기존 버튼이 sendFinalChecklistSms를 호출해도 모달부터 열리게 고정
  window.sendFinalChecklistSms = function(){
    window.openActorBeforeSms();
  };
})();
</script>
