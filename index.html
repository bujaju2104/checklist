<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:#f8fafc;color:#1e293b;display:flex;flex-direction:column;max-width:430px;margin:0 auto;height:100dvh;overflow:hidden}
button{font-family:'Noto Sans KR',sans-serif;cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:0}
#header{padding:12px 14px 10px;flex-shrink:0}
.h-top{display:flex;gap:10px;align-items:center;margin-bottom:7px}
.h-icon{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.h-name{font-size:14px;font-weight:800;color:#fff;line-height:1.2}
.h-addr{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px}
.h-chips{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:20px;padding:2px 9px;font-size:10px}
.sync-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.15);border-radius:20px;padding:2px 8px;font-size:10px;color:#86efac;cursor:pointer}
.notif-bar{background:#f59e0b;color:#fff;font-size:11px;font-weight:700;padding:8px 14px;text-align:center;cursor:pointer;flex-shrink:0;display:none;position:relative;z-index:99999;pointer-events:all;-webkit-tap-highlight-color:rgba(255,165,0,0.3)}
#main-tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;flex-shrink:0}

      "1-0":[{title:"계약 체결",ac:"#7c3aed",items:[{id:"c1",text:"정식 계약 체결",date:"2026.05.30 오전 11시",st:"soon",note:"매도인 이종정 · 매수인 유충만"},{id:"c2",text:"계약금 수령 (4,550만원)",date:"2026.05.30",st:"soon",note:"200만원 가계약금 포함"},{id:"c3",text:"계약서 원본 보관",date:"2026.05.30",st:"soon"}]}],
      "1-1":[{title:"🏛 부동산거래신고 — 계약 후 30일 이내",ac:"#0891b2",items:[{id:"rg1",text:"부동산거래신고 접수",date:"마감 2026.06.29",st:"soon",note:"계약일 2026.05.30 기준 30일 이내"},{id:"rg2",text:"매매계약서 제출",date:"계약 후 30일 이내",st:"soon"}]}],
      "1-2":[{title:"📎 계약일 필요서류 — 매도인 이종정",ac:"#0891b2",items:[{id:"cd1",text:"신분증",st:"soon"},{id:"cd2",text:"도장 (인감)",st:"soon"},{id:"cd3",text:"등기필증",st:"soon"},{id:"cd4",text:"통장사본 or 계좌번호",st:"soon",note:"우리은행 299-044548-02-101"}]},{title:"⚠️ 대리 계약시 추가 서류",ac:"#9ca3af",items:[{id:"ca1",text:"대리인 신분증",st:"info"},{id:"ca2",text:"위임장 (인감도장 날인)",st:"info"},{id:"ca3",text:"인감증명서",st:"info"}]}],
      "2":[{title:"중도금 수령",ac:"#0891b2",items:[{id:"m1",text:"중도금 수령 (9,100만원)",date:"2026.07.03",st:"soon"}]},{title:"⚠️ 중도금 이후 주의사항",ac:"#d97706",items:[{id:"m2",text:"추가 대출·저당권 설정 금지",st:"soon",note:"중도금 입금 후 새로운 권리변동 불가 (특약)"}]}],
      "3-0":[{title:"잔금 수령",ac:"#16a34a",items:[{id:"r1",text:"잔금 수령 (3억 1,850만원)",date:"2026.08 말",st:"soon",note:"계약일 협의 후 확정"},{id:"r2",text:"소유권이전 등기 협조",date:"잔금일",st:"soon"}]},{title:"정산",ac:"#7c3aed",items:[{id:"r3",text:"관리비 정산",date:"잔금일",st:"soon"},{id:"r4",text:"선수관리비 정산",date:"잔금일",st:"soon"},{id:"r5",text:"도시가스 정산",date:"잔금일",st:"soon"}]}],
      "3-1":[{title:"📎 잔금일 필요서류 — 매도인 이종정",ac:"#0891b2",items:[{id:"rd1",text:"신분증",st:"soon"},{id:"rd2",text:"등기관리증 (등기필증) 원본",st:"soon"},{id:"rd3",text:"부동산 매도용 인감증명서",st:"soon",note:"매수인 유충만 인적사항 기재"},{id:"rd4",text:"인감도장",st:"soon"},{id:"rd5",text:"주민등록초본 (과거 주소변동 전부 기재)",st:"soon"}]},{title:"⚠️ 대리 잔금시 추가 서류",ac:"#9ca3af",items:[{id:"ra1",text:"대리인 신분증",st:"info"},{id:"ra2",text:"위임장 (인감도장 날인)",st:"info"},{id:"ra3",text:"인감증명서",st:"info"}]}],
      "3-2":[{title:"🗝 물품 인계",ac:"#0891b2",items:[{id:"ri1",text:"물품인계서 작성 및 서명",st:"soon"},{id:"ri2",text:"열쇠·카드 인계",st:"soon"},{id:"ri3",text:"공동현관 비밀번호 알려주기",st:"soon"},{id:"ri4",text:"세대현관 비밀번호 알려주기",st:"soon"}]}],
    }
  }
};

// ── URL 파라미터로 고객 선택 ──
const urlParams = new URLSearchParams(window.location.search);
const clientKey = urlParams.get("c");
const C = CLIENTS[clientKey];

if(!C){
  document.getElementById("header").style.display="none";
  document.getElementById("main-tabs").style.display="none";
  document.getElementById("sub-tabs").style.display="none";
  document.getElementById("progress").style.display="none";
  document.getElementById("content").style.display="none";
  document.getElementById("error-page").style.display="flex";
} else {
  // 헤더 설정
  document.getElementById("header").style.background=C.headerBg;
  document.title=`체크리스트 | ${C.name}`;
  document.getElementById("hicon").textContent=C.icon;
  document.getElementById("hname").textContent=C.name;
  document.getElementById("haddr").textContent=C.addr;
  document.getElementById("hprice").textContent=`💵 ${C.price}`;
  document.getElementById("hbuyer").textContent=`👥 ${C.buyer}`;
  document.getElementById("footer").style.display="block";

  const sb=supabase.createClient(SB_URL,SB_KEY);
  const LKEY=`chk_${clientKey}`;
  let curMain=0, curSubs={}, chk={}, mySet=new Set();
  try{chk=JSON.parse(localStorage.getItem(LKEY)||"{}");}catch{}

  function pkey(m,s){
    const hasSub=C.sub[m];
    return hasSub?`${m}-${s}`:`${m}`;
  }
  function allItems(m){
    const hasSub=C.sub[m];
    if(hasSub)return Object.keys(hasSub).map((_,i)=>i).flatMap(s=>(C.pages[`${m}-${s}`]||[]).flatMap(sec=>sec.items));
    return(C.pages[`${m}`]||[]).flatMap(sec=>sec.items);
  }

  function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);}
  function setSB(s){const b=document.getElementById("sbadge");b.textContent=s==="ok"?"✅ 실시간 연동":s==="err"?"❌ 연결끊김":"🔄 연결중...";}
  // OneSignal 지연 로드 (클릭 차단 방지)
  function loadOneSignalAndSubscribe(){
    return new Promise(function(resolve){
      if(window.OneSignalDeferred){resolve();return;}
      window.OneSignalDeferred=[];
      const s=document.createElement('script');
      s.src='https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js';
      s.defer=true;
      s.onload=function(){
        OneSignalDeferred.push(async function(OS){
          await OS.init({appId:"39128b82-e41e-4f66-b343-6d8db083e430",notifyButton:{enable:false}});
          try{await OS.User.PushSubscription.optIn();}catch(e){}
          resolve();
        });
      };
      document.head.appendChild(s);
    });
  }

  function reqNotif(){
    const ua=navigator.userAgent;
    const isInApp=/KAKAO|Line|Instagram|FBAV|FBAN/i.test(ua);
    const isIOS=/iPad|iPhone|iPod/.test(ua);
    if(isInApp)return toast(isIOS?"Safari로 열어주세요 🔔":"Chrome으로 열어주세요 🔔");
    if(!("Notification"in window))return toast("이 브라우저는 알림 미지원");
    if(Notification.permission==="granted"){
      document.getElementById("nbar").style.display="none";
      loadOneSignalAndSubscribe();
      toast("✅ 알림 이미 허용됨!");
      return;
    }
    Notification.requestPermission().then(function(p){
      if(p==="granted"){
        document.getElementById("nbar").style.display="none";
        toast("✅ 알림 켜졌어요!");
        loadOneSignalAndSubscribe(); // 허용 후 OneSignal 구독
      } else {
        toast("설정 > 알림 > 허용으로 변경해주세요");
      }
    });
  }
    function sendNotif(title,body){
    // OneSignal이 서버에서 푸시 발송 — 여기선 토스트만
    toast("🔔 "+body);
  }
  function saveLocal(){try{localStorage.setItem(LKEY,JSON.stringify(chk));}catch{}}
  async function saveSB(){try{await sb.from(TB).upsert({id:C.rowId,checked_items:chk,updated_at:new Date().toISOString()});setSB("ok");}catch{setSB("err");}}
  async function loadSB(){
    try{
      const{data,error}=await sb.from(TB).select("checked_items").eq("id",C.rowId).single();
      if(error&&error.code!=="PGRST116")throw error;
      if(data?.checked_items){chk=data.checked_items;saveLocal();}
      setSB("ok");
    }catch{setSB("err");}
    render();
  }
  function subscribeSB(){
    sb.channel(`ch-${clientKey}`).on("postgres_changes",{event:"*",schema:"public",table:TB,filter:`id=eq.${C.rowId}`},payload=>{
      const nd=payload.new?.checked_items;if(!nd)return;
      Object.keys(nd).forEach(id=>{
        if(nd[id]&&!chk[id]&&!mySet.has(id))sendNotif(`${C.name} ✅`,`완료됐어요!`);
      });
      chk=nd;mySet.clear();saveLocal();render();
    }).subscribe(s=>{if(s==="SUBSCRIBED")setSB("ok");});
  }

  render();
  if("Notification"in window){
    if(Notification.permission==="default"){
      document.getElementById("nbar").style.display="block";
    } else if(Notification.permission==="granted"){
      // 이미 허용된 기기 → OneSignal 자동 구독
      loadOneSignalAndSubscribe();
    }
  }
  loadSB().then(()=>subscribeSB());

  function render(){
    const hasSub=C.sub[curMain];
    const subs=hasSub?C.sub[curMain]:[];
    const csub=curSubs[curMain]??0;
    const secs=hasSub?(C.pages[`${curMain}-${csub}`]||[]):(C.pages[`${curMain}`]||[]);
    const ai=allItems(curMain);
    const dn=ai.filter(i=>chk[i.id]||i.st==="done").length;
    const pct=ai.length?Math.round((dn/ai.length)*100):0;

    document.getElementById("main-tabs").innerHTML=C.tabs.map(t=>{
      const a=curMain===t.id;
      return`<button class="mtab${a?" active":""}" onclick="go(${t.id})" style="${a?`color:${C.activeColor};border-bottom-color:${C.activeColor}`:""}">
        <span class="mtab-icon">${t.icon}</span>${t.label}</button>`;}).join("");

    const se=document.getElementById("sub-tabs");
    if(hasSub){
      se.style.display="flex";
      se.innerHTML=subs.map((l,i)=>{const a=(curSubs[curMain]??0)===i;
        return`<button class="stab${a?" active":""}" onclick="gs(${i})" style="${a?`color:${C.subColor};border-bottom-color:${C.subColor}`:""}">${l}</button>`;}).join("");
    }else se.style.display="none";

    document.getElementById("plabel").textContent=`${C.tabs[curMain].icon} ${C.tabs[curMain].label}`;
    document.getElementById("ppct").textContent=`${pct}%`;
    document.getElementById("ppct").style.color=C.activeColor;
    document.getElementById("pfill").style.background=C.progGrad;
    document.getElementById("pfill").style.width=`${pct}%`;

    document.getElementById("content").innerHTML=secs.map(sec=>`
      <div>
        <div class="sec-label" style="color:${sec.ac}">
          <div class="sec-bar" style="background:${sec.ac}"></div>${sec.title}</div>
        <div class="card">${sec.items.map(item=>{
          const on=chk[item.id]||item.st==="done";
          const s=ST[item.st]||ST.soon;
          const tc=item.tag?C.tags[item.tag]:null;
          return`<div class="item${on?" on":""}" onclick="tap('${item.id}','${item.st}')">
            <div class="cb${on?" checked":""}" style="${on?"":"border-color:"+s.dot}">${on?"✓":""}</div>
            <div class="item-body">
              <div class="item-text"><span class="t">${item.text}</span>
                ${tc?`<span class="tag" style="background:${tc.bg};color:${tc.txt}">${item.tag}</span>`:""}</div>
              ${(item.date||item.note)?`<div class="item-meta">
                ${item.date?`<span class="idate" style="color:${s.dot}">📅 ${item.date}</span>`:""}
                ${item.note?`<span class="inote">${item.note}</span>`:""}</div>`:""}
            </div>
            <span class="badge" style="background:${on?ST.done.bg:s.bg};color:${on?ST.done.txt:s.txt}">${on?"완료":s.lbl}</span>
          </div>`;}).join("")}</div></div>`).join("");
  }

  window.go=function(m){curMain=m;render();}
  window.gs=function(s){curSubs[curMain]=s;render();}
  window.tap=function(id,st){
    if(st==="done")return;
    chk[id]=!chk[id];
    mySet.add(id);saveLocal();saveSB();render();
    toast(chk[id]?"✅ 완료!":"↩️ 해제");
  }
}
</script>

<script>
// Service Worker 등록
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW error:', err));
  });
}
</script>
