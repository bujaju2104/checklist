let cur='p0';
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function esc(x){return String(x||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function drawTabs(){tabs.innerHTML=Object.keys(D).map(k=>`<button class="tab ${k===cur?'on':''}" onclick="openTab('${k}')">${D[k].name} <span class="cnt" id="cnt_${k}">-</span></button>`).join('')}
function openTab(k){cur=k;drawTabs();render();upd()}
function setPage(i){S.page[cur]=i;save();render();upd()}
function currentPage(){return S.page[cur]||0}
function render(){const d=D[cur];let html=`<div class="panel on">`;
 if(d.pages){let pi=currentPage();const p=d.pages[pi];html+=`<div class="subnav">${d.pages.map((x,i)=>`<button class="chip ${i===pi?'on':''}" onclick="setPage(${i})">${i+1}. ${x.title.replace(/[📊⚠️📄💰✅🤝🔄📋🚚🧱🏗📍]/g,'').trim()}</button>`).join('')}</div><div class="screen">`;if(p.alert)html+=`<div class="alert">${esc(p.alert)}</div>`;html+=renderPage(p,cur,pi);html+=`<div class="actions"><button class="navbtn subtle" onclick="setPage(${pi-1})" ${pi===0?'disabled':''}>← 이전</button><button class="navbtn" onclick="setPage(${pi+1})" ${pi===d.pages.length-1?'disabled':''}>다음 →</button></div></div>`}
 else if(d.type==='form')html+=renderForm(); else html+=renderLog(); html+=`</div>`;content.innerHTML=html}
function renderPage(p,g,pi){if(p.kind==='dark')return `<div class="dark"><div class="darktitle">${p.title}</div><div class="grid">${p.items.map(it=>`<div class="info ${it[3]==='full'?'full':''}"><div class="il">${esc(it[0])}</div><div class="iv ${it[2]||''}">${esc(it[1])}</div></div>`).join('')}</div></div>`;
 if(p.kind==='stage')return `<div class="card flex"><div class="ch navy">${p.title}<span class="tiny">스크롤 없음</span></div><div class="body">${p.items.map(it=>`<div class="stage"><div class="sico ${it[0]}">${it[0]==='done'?'✅':it[0]==='now'?'⏳':'🏗'}</div><div class="sinfo"><div class="sn">${esc(it[1])}</div><div class="sd">${esc(it[2])}</div></div><span class="badge ${it[0]}">${esc(it[3])}</span></div>`).join('')}</div></div>`;
 if(p.kind==='pay')return `<div class="card flex"><div class="ch ${p.color}">${p.title}</div><div class="body">${p.items.map(it=>`<div class="pay"><span class="dot ${it[0]}"></span><div style="flex:1"><div class="main">${esc(it[1])}</div><div class="sub">${esc(it[2])}</div></div><div class="pa">${esc(it[3])}</div></div>`).join('')}<div class="acct"><div class="al">매도자 계좌 · 국민은행</div><div class="anum">007050033372</div><div class="sub" style="color:rgba(255,255,255,.55)">예금주: 심재욱</div><button class="copy" onclick="copyAcct()">📋 복사</button></div></div></div>`;
 return `<div class="card flex"><div class="ch ${p.color||'navy'}">${p.title}<span class="tiny">${pi+1}/${D[g].pages.length}</span></div><div class="body">${p.items.map((it,i)=>{const key=`${g}_${pi}_${i}`,on=S.checks[key];return `<div class="ci ${on?'done':''}" onclick="chk('${key}','${esc(it[0])}')"><div class="box"><span class="tick">✓</span></div><div><div class="main">${esc(it[0])}</div>${it[1]?`<div class="sub">${esc(it[1])}</div>`:''}${it[2]?`<span class="tag ${it[2].includes('필수')?'':it[2].includes('리스크')||it[2].includes('중요')?'o':'gray'}">${esc(it[2])}</span>`:''}</div></div>`}).join('')}</div></div>`}
function renderForm(){return `<div class="screen"><div class="card flex"><div class="ch blue">📱 알림 설정 / 추가</div><div class="body"><div class="alert" style="margin-bottom:8px">현재 파일은 내 휴대폰 안에 저장되는 방식입니다. 체크하거나 추가한 알림은 기록에 남고, 실제 문자·카카오 자동발송은 서버 연동 후 가능합니다.</div><div class="main" style="margin-bottom:4px">최종관님 휴대폰</div><input class="inp" id="bp" value="${esc(S.buyer.phone||'')}" placeholder="010-0000-0000"><div class="main" style="margin:8px 0 4px">카카오톡 ID 선택</div><input class="inp" id="bk" value="${esc(S.buyer.kakao||'')}" placeholder="카카오톡 ID"><button class="save" onclick="saveBuyer()">💾 연락처 저장</button><div style="height:10px"></div><div class="main" style="margin-bottom:4px">알림 직접 추가</div><input class="inp" id="alarmTitle" placeholder="예: 잔금 D-7 서류 확인"><div class="minirow"><button class="save" onclick="addAlarm('나')">내 알림 추가</button><button class="save" onclick="addAlarm('최종관님')">최종관님 알림 추가</button></div><div style="height:8px"></div>${['계약금 D-1','계약금 당일','관리처분인가 예정','잔금 D-7','잔금 D-1','승계 완료'].map(x=>`<div class="pay" onclick="quickAlarm('${x}')"><span class="dot now"></span><div style="flex:1"><div class="main">${x} 알림</div><div class="sub">누르면 내 알림 기록에 추가됩니다</div></div><span class="badge now">추가</span></div>`).join('')}</div></div></div>`}
function renderLog(){return `<div class="screen"><div class="card"><div class="ch navy">✍️ 메모 추가</div><div class="body"><textarea class="memo" id="memoIn" placeholder="통화 내용, 진행 사항, 특이사항 입력"></textarea><button class="save" onclick="addMemo()">기록 저장</button></div></div><div class="card flex"><div class="ch navy">📁 최근 진행 기록 <span class="tiny">최근 5개 표시 · 삭제 가능</span></div><div class="body" id="logs">${(S.logs||[]).slice(0,5).map((l,i)=>`<div class="log"><div class="lt"><span>${esc(l.ts)}</span><button class="del" onclick="delLog(${i})">삭제</button></div><div class="lx">${esc(l.txt)}</div></div>`).join('')||'<div class="tiny" style="text-align:center;padding:25px">아직 기록이 없습니다.</div>'}</div></div></div>`}
function chk(key,label){S.checks[key]=!S.checks[key];addLog((S.checks[key]?'✅ ':'↩️ ')+label,false);save();render();upd()}
function now(){const d=new Date();return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function addLog(txt,rer=true){S.logs.unshift({ts:now(),txt});if(S.logs.length>200)S.logs.pop();save();if(rer)render();upd()}
function addMemo(){const v=document.getElementById('memoIn').value.trim();if(!v)return;addLog(v)}
function delLog(i){if(!confirm('이 기록을 삭제할까요?'))return;S.logs.splice(i,1);save();render();upd()}
function addAlarm(who){const el=document.getElementById('alarmTitle');const v=(el&&el.value.trim())||'';if(!v){alert('알림 내용을 입력해주세요');return}addLog('🔔 '+who+' 알림 추가: '+v);el.value=''}
function quickAlarm(x){addLog('🔔 내 알림 추가: '+x)}
function saveBuyer(){S.buyer={phone:document.getElementById('bp').value,kakao:document.getElementById('bk').value};save();addLog('최종관님 연락처 저장: '+(S.buyer.phone||'번호 미입력'));alert('저장 완료')}
function copyAcct(){const t='007050033372';if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(t).then(()=>alert('계좌번호 복사됨: '+t)).catch(()=>prompt('계좌번호를 길게 눌러 복사하세요',t))}else{prompt('계좌번호를 길게 눌러 복사하세요',t)}}
function allKeys(){let arr=[];Object.keys(D).forEach(g=>(D[g].pages||[]).forEach((p,pi)=>{if(p.items&&D[g].type==='check'&&p.kind!=='pay')p.items.forEach((_,i)=>arr.push(`${g}_${pi}_${i}`))}));return arr}
function upd(){const keys=allKeys(),d=keys.filter(k=>S.checks[k]).length,t=keys.length,p=t?Math.round(d/t*100):0;fill.style.width=p+'%';hpct.textContent=p+'%';doneLbl.textContent=d+'개 완료';totalLbl.textContent='전체 '+t+'개';fdone.textContent=d;fleft.textContent=t-d;fpct.textContent=p+'%';Object.keys(D).forEach(g=>{const el=document.getElementById('cnt_'+g);if(!el)return;let ks=[];(D[g].pages||[]).forEach((p,pi)=>{if(D[g].type==='check'&&p.kind!=='pay')p.items.forEach((_,i)=>ks.push(`${g}_${pi}_${i}`))});el.textContent=ks.length?`${ks.filter(k=>S.checks[k]).length}/${ks.length}`:(g==='p6'?(S.logs||[]).length:'-')})}
if(!S.logs.length){addLog('✅ 가계약금 1,000만원 입금 완료 (2026.06.06) — 국민 007050033372 심재욱',false)}
drawTabs();render();upd();
</script>
</body>
</html>
